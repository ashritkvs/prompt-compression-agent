# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Comprehensive promptfoo regression suite for the LIVE Prompt Compression
# Agent API. Uses only promptfoo's own documented assertion types:
#   is-json, javascript, latency, icontains, regex (+ per-assertion transform).
#
# Run from the repo root:
#   npx promptfoo@latest eval -c promptfoo/promptfooconfig.yaml --no-cache
#   npx promptfoo@latest view          # open the results UI
#
# promptfoo only speaks HTTP, so the OpenAI key lives on the server (HF Space
# secret) — you do NOT need a key locally. Note: the HTTP provider parses the
# JSON response into an OBJECT before assertions run, so `output` is an object.
#
# Cost: every test is a real compression run = real OpenAI tokens
# (~$0.001-0.005 each).

description: Prompt Compression Agent — comprehensive live API suite

providers:
  - id: https://ashrit25-prompt-compression-agent.hf.space/compress
    label: compress-live
    config:
      method: POST
      headers:
        Content-Type: application/json
      body:
        prompt: "{{prompt}}"
      # Let 4xx validation responses (e.g. 422) through so we can assert on
      # them instead of erroring the test.
      validateStatus: "status < 500"

prompts:
  - "{{prompt}}"

# ---------------------------------------------------------------------------
# Assertions applied to EVERY test. These tolerate both a successful
# AgentResult and a 422 validation-error body.
# ---------------------------------------------------------------------------
defaultTest:
  assert:
    # Always valid JSON (true for both AgentResult and the 422 error body).
    - type: is-json
    # Response time budget — generous to tolerate a cold-start model reload.
    - type: latency
      threshold: 90000
    # Structure + internal-consistency check. Skipped for 422 validation
    # responses (which carry a `detail` field instead of AgentResult fields).
    - type: javascript
      value: |
        const r = typeof output === 'string' ? JSON.parse(output) : output;
        if (r && r.detail) return true; // validation-error response: skip
        const required = ['original_prompt','compressed_prompt','original_tokens',
          'compressed_tokens','tokens_saved','reduction_pct','meaning_score',
          'total_steps','steps','success'];
        for (const k of required) if (!(k in r)) throw new Error('missing field: ' + k);
        if (r.failure_reason) throw new Error('agent error: ' + r.failure_reason);
        if (r.original_tokens - r.compressed_tokens !== r.tokens_saved)
          throw new Error('tokens_saved inconsistent');
        if (r.total_steps < 1) throw new Error('no steps recorded');
        if (!Array.isArray(r.steps) || r.steps.length === 0)
          throw new Error('no step trace');
        return true;

tests:
  # ----- Compression quality across verbosity levels -----
  - description: Extremely verbose — compress hard, keep core meaning
    vars:
      prompt: >-
        Could you please possibly help me understand in a very detailed and
        comprehensive way what machine learning actually is, including all the
        different types and subtypes if at all possible?
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.compressed_tokens >= r.original_tokens) throw new Error('did not shrink');
          if (r.reduction_pct < 25) throw new Error('reduction too low: ' + r.reduction_pct);
          if (r.meaning_score < 55) throw new Error('meaning too low: ' + r.meaning_score);
          return true;
      # Core subject must survive compression (icontains + transform).
      - type: icontains
        value: machine learning
        transform: "(typeof output === 'string' ? JSON.parse(output) : output).compressed_prompt"

  - description: Verbose essay request — meaningful reduction
    vars:
      prompt: >-
        I would like to kindly request, if it is at all possible, that you
        please write a very detailed and comprehensive and thorough step by
        step guide explaining how to actually bake a perfect sourdough bread
        loaf from scratch, including all the little tips and tricks.
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.reduction_pct < 25) throw new Error('reduction too low: ' + r.reduction_pct);
          return true;
      - type: icontains
        value: sourdough
        transform: "(typeof output === 'string' ? JSON.parse(output) : output).compressed_prompt"

  - description: Moderately verbose — should still shrink
    vars:
      prompt: >-
        Could you please help me understand how neural networks learn, and
        explain backpropagation in a fairly detailed way if possible, because I
        just wanted to understand how the weights are actually updated.
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.compressed_tokens >= r.original_tokens) throw new Error('did not shrink');
          if (r.reduction_pct < 15) throw new Error('reduction too low: ' + r.reduction_pct);
          return true;

  - description: Technical ask — meaning preserved, key term survives (regex)
    vars:
      prompt: >-
        Please explain the difference between TCP and UDP protocols and when you
        would actually want to use each one in real world networking.
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.meaning_score < 60) throw new Error('meaning too low: ' + r.meaning_score);
          return true;
      - type: regex
        value: "TCP|UDP"
        transform: "(typeof output === 'string' ? JSON.parse(output) : output).compressed_prompt"

  # ----- Concise controls -----
  - description: Already-concise control — must not error, output non-empty
    vars:
      prompt: "Explain the difference between HTTP and HTTPS."
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (!r.compressed_prompt || r.compressed_prompt.trim().length === 0)
            throw new Error('empty compressed prompt');
          if (r.reduction_pct < 0) throw new Error('negative reduction');
          return true;

  - description: Short control — minimal but valid
    vars:
      prompt: "Define recursion and give one example."
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.compressed_tokens < 1) throw new Error('compressed away to nothing');
          return true;

  # ----- Edge cases -----
  - description: Non-English (Spanish) — multilingual model should handle it
    vars:
      prompt: >-
        Por favor, ¿podrías explicarme de manera muy detallada y completa qué es
        el aprendizaje automático y cuáles son sus diferentes tipos?
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (!r.compressed_prompt || r.compressed_prompt.trim().length === 0)
            throw new Error('empty output for non-English input');
          return true;

  - description: Code / special characters — must not crash the pipeline
    vars:
      prompt: >-
        Please review this function and explain what it does in detail:
        def add(a, b): return a + b  # simple helper, used everywhere {x: 1}
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.failure_reason) throw new Error('crashed on code input');
          if (!r.compressed_prompt) throw new Error('empty output');
          return true;

  - description: Near-minimum length boundary — just over 10 chars, must work
    vars:
      prompt: "Explain DNS basics."
    assert:
      - type: javascript
        value: |
          const r = typeof output === 'string' ? JSON.parse(output) : output;
          if (r.failure_reason) throw new Error('failed on short valid input');
          return true;

  # ----- Input validation (expect HTTP 422 with a clear message) -----
  - description: Too short (< 10 chars) — server rejects with validation error
    vars:
      prompt: "hi"
    assert:
      - type: javascript
        value: |
          const s = typeof output === 'string' ? output : JSON.stringify(output);
          if (!s.includes('Prompt too short'))
            throw new Error('expected too-short validation error, got: ' + s.slice(0, 200));
          return true;

  - description: Too long (> 3000 chars) — server rejects with validation error
    vars:
      prompt: file://long_prompt.txt
    assert:
      - type: javascript
        value: |
          const s = typeof output === 'string' ? output : JSON.stringify(output);
          if (!s.includes('Prompt too long'))
            throw new Error('expected too-long validation error, got: ' + s.slice(0, 200));
          return true;
